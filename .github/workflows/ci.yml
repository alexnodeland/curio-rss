# CI for the cargo workspace + the desktop frontend. Phase 4 brought the
# desktop head (apps/desktop/src-tauri, curio-desktop) into the workspace,
# so the --workspace jobs compile tauri and need the webkit2gtk/gtk system
# packages; the Rust jobs stay npm-free (the crate builds against a
# placeholder frontendDist), and the CLI head remains the proof that
# curio-core itself is headless (the boundary job checks its tree stays
# webview-free). The frontend rewrite (WP2) added its own npm jobs:
# desktop-lint (biome + eslint + svelte-check, zero warnings),
# desktop-test (vitest + mockIPC with the 70% state/utils coverage
# floor), and frontend-bans (the {@html} + raw-invoke greps).
# Local mirror: `just ci`.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install webview system deps (tauri workspace build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install webview system deps (tauri workspace build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo test --workspace

  doc:
    name: rustdoc (-D warnings)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install webview system deps (tauri workspace build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo doc --workspace --no-deps

  coverage:
    # Region floor on crates/curio-core; report-only for the other crates.
    # The floor and the non-core regex mirror `just cov` — ratchet rule in
    # CONTRIBUTING.md: the number only moves up, and it moves in both files
    # together.
    name: coverage (curio-core regions >= 85%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Install webview system deps (tauri workspace build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Run the workspace suite under llvm-cov
        run: cargo llvm-cov --workspace --no-report
      - name: Workspace coverage (report-only)
        run: cargo llvm-cov report --summary-only
      - name: Enforce the curio-core region floor
        run: |
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex '(crates/curio-cli|crates/curio-types|crates/curio-fixtures|xtask|apps/desktop/src-tauri)/' \
            --fail-under-regions 85

  deny:
    name: cargo-deny (advisories, licenses, webview ban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  ipc-contract:
    # The single highest-value gate: regenerate the tauri-specta TS
    # bindings from the Rust command surface and fail on any drift from
    # the committed file — Rust-signature changes cannot ship without
    # their bindings. Local mirror: `just bindings-check`.
    name: ipc-contract (bindings drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install webview system deps (tauri workspace build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Regenerate the bindings
        run: cargo test -p curio-desktop --test export_bindings
      - name: Fail on drift from the committed bindings
        run: git diff --exit-code apps/desktop/src/lib/bindings.ts

  boundary:
    name: webview boundary (curio-core is tauri-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- boundary

  desktop-lint:
    # Zero warnings is a Phase 4 acceptance criterion: biome (TS), eslint
    # (svelte templates — biome cannot lint them), svelte-check.
    name: desktop lint (biome + eslint + svelte-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:eslint
      - run: npm run check

  desktop-test:
    # vitest + mockIPC (tier 1 — real & cheap), including the contract test
    # that invokes every generated wrapper. Coverage floor: 70% on the
    # src/lib state/utils layer; components report-only.
    name: desktop test (vitest + coverage floor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run test:coverage

  frontend-bans:
    # {@html} may appear only in the sanitized-render component; raw
    # @tauri-apps/api/core imports only in the generated bindings.
    # Local mirror: `just frontend-bans` (also a lefthook pre-commit step).
    name: frontend bans ({@html} + raw invoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-frontend-bans.sh

  blob-guard:
    name: blob-size guard (no object > 1MB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if any git object exceeds 1MB
        run: |
          set -euo pipefail
          limit=1048576
          oversized=$(git rev-list --objects --all \
            | git cat-file --batch-check='%(objecttype) %(objectname) %(objectsize) %(rest)' \
            | awk -v limit="$limit" '$1 == "blob" && $3 > limit { print $3 " " $2 " " substr($0, index($0, $4)) }' \
            | sort -rn || true)
          if [ -n "$oversized" ]; then
            echo "::error::git objects larger than 1MB found in history:"
            echo "$oversized"
            exit 1
          fi
          echo "blob guard: OK — no object in history exceeds 1MB"
