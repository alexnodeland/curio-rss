# Nightly + on-demand workflow — deliberately NOT per-PR or per-merge (see
# ci.yml for the fast PR gate). This is the heavy tier: the 3-OS `tauri build`
# matrix that
# produces the shippable (unsigned) bundles, the WebdriverIO + tauri-driver
# smoke on the two platforms a driver exists for (Linux + Windows — there is
# no macOS tauri-driver, so macOS is covered by the manual release checklist),
# and the criterion cold-start benchmark that hosts the Phase-4 <1.5s gate.
#
# Signing is intentionally OFF, permanently: distribution is an unsigned
# Homebrew cask (Apple enrollment skipped, Windows deferred —
# docs/design/decisions.md). The build passes NO signing env, so tauri never
# attempts codesign; the app runs via right-click → Open / xattr.
name: nightly

on:
  # Daily + on-demand only — NOT per-push. The per-PR gate (ci.yml) already
  # validates every change, and release.yml builds the shipped bundles on a
  # tag, so building the full 3-OS matrix on every merge just hammered the
  # (scarce) macOS runners. Dispatch a run manually before a release if you
  # want a fresh cross-platform bundle + e2e + bench.
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  bundle:
    name: tauri build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64, os: ubuntu-22.04 }
          - { name: macos-arm64, os: macos-14 }
          - { name: macos-x64, os: macos-13 }
          - { name: windows-x64, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install Linux webview + bundling deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf
      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci
      - name: Build the unsigned bundle
        working-directory: apps/desktop
        # Unsigned, permanently: Apple Developer enrollment is skipped
        # (docs/design/decisions.md), so we pass NO signing env — tauri then
        # produces an unsigned artifact instead of trying (and failing) to
        # `security import` a certificate. Distribution is the unsigned
        # Homebrew cask; the app is run via right-click → Open / xattr.
        run: npm run tauri build
      - name: Upload the bundle
        uses: actions/upload-artifact@v4
        with:
          name: curio-${{ matrix.name }}
          # src-tauri is a workspace member, so cargo/tauri emit to the
          # workspace-root target/, not a crate-local one.
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
          if-no-files-found: warn

  smoke:
    name: e2e smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux, os: ubuntu-22.04 }
          - { name: windows, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install Linux webview deps + WebKitWebDriver
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev webkit2gtk-driver xvfb
      - name: Install tauri-driver
        run: cargo install tauri-driver --locked
      - name: Build the app under test (debug)
        working-directory: apps/desktop
        run: |
          npm ci
          npm run build
          cargo build --manifest-path src-tauri/Cargo.toml
      - name: Install e2e harness deps
        working-directory: apps/desktop/e2e
        run: npm install
      - name: Run the WebdriverIO smoke suite
        working-directory: apps/desktop/e2e
        # Skeleton: the 5 scenarios are wired but several are `.skip` pending
        # test-harness selectors, so this stays informational until the suite
        # is filled in. Flip to a hard gate once the scenarios are live.
        continue-on-error: true
        run: xvfb-run --auto-servernum npm test

  bench:
    name: cold-start bench (@50k fixture)
    # curio-fixtures depends on curio-core only (no webview), so this job
    # needs no gtk/webkit system packages.
    runs-on: ubuntu-22.04
    # `contents: write` is for the alert path only: `comment-on-alert` posts a
    # commit comment through the API. The benchmark HISTORY is NOT kept on a
    # gh-pages branch — it lives in a cached JSON (`external-data-json-path`
    # below), so this job never fetches or pushes a branch. (The old config
    # stored on gh-pages and failed on *every* run — this repo's Pages builds
    # from `main` via the Actions build type, so no gh-pages branch exists and
    # `git fetch gh-pages` died with "couldn't find remote ref gh-pages".)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The rolling benchmark baseline, persisted between nightly runs via the
      # Actions cache instead of a gh-pages branch. A per-run key always writes
      # a fresh cache; `restore-keys` pulls the most recent prior baseline to
      # compare against. The first run finds none, seeds the file, and — with
      # no previous point — cannot alert.
      - name: Restore the rolling benchmark baseline
        uses: actions/cache@v4
        with:
          path: ./.bench-cache
          key: bench-cold-start-${{ github.run_id }}
          restore-keys: |
            bench-cold-start-
      - name: Run the criterion cold-start benchmark
        # bencher output format is what github-action-benchmark's `cargo`
        # parser consumes; the fixture is generated inside the bench harness.
        # `mkdir -p` guarantees the external-data-json-path parent exists on the
        # first run, before any cache entry has been created.
        run: |
          mkdir -p ./.bench-cache
          cargo bench -p curio-fixtures --bench cold_start -- --output-format bencher \
            | tee bench-output.txt
      - name: Track against the trailing baseline (alert at 130%)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: cold-start (open + first page @50k)
          tool: cargo
          output-file-path: bench-output.txt
          # Store history in a cached JSON file, NOT on gh-pages: no git fetch,
          # no branch, no push. Comparison + alert + commit-comment still work.
          external-data-json-path: ./.bench-cache/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "130%"
          comment-on-alert: true
          fail-on-alert: true
          save-data-file: true
