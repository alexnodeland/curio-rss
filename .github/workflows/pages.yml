# Docs / landing site → GitHub Pages. The site under `site/` is fully static
# (self-contained HTML/CSS + screenshots; mermaid loads from a CDN at view
# time), so "build" is just uploading the directory. Deploys on push to main
# when the site changes, or on demand.
name: pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
