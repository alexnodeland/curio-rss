# Release workflow — pushing a `vX.Y.Z` tag builds the unsigned macOS
# **universal** bundle (arm64 + x64 in one binary) on a single Apple-silicon
# runner, and publishes a DRAFT GitHub release with the DMG under the stable
# name the Homebrew cask expects (Curio-universal.dmg, which backs
# `releases/latest/download/Curio-universal.dmg`). A universal build avoids
# the scarce Intel (`macos-13`) runner queue entirely and matches the tap's
# other casks. The release is a DRAFT on purpose: nothing is public — and
# `brew` sees nothing — until a human reviews it and clicks Publish. macOS is
# the shipped channel, unsigned (docs/design/decisions.md).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci
      - name: Build the unsigned universal bundle
        working-directory: apps/desktop
        # No signing env — unsigned by decision (see nightly.yml / decisions.md).
        # Universal lipo of arm64 + x64 on the arm64 runner.
        run: npm run tauri build -- --target universal-apple-darwin
      - name: Rename the DMG to the cask's stable name
        # tauri emits Curio_<version>_universal.dmg under the target-specific
        # bundle dir; the cask URL resolves Curio-universal.dmg.
        run: |
          set -euo pipefail
          src=$(ls target/universal-apple-darwin/release/bundle/dmg/Curio_*_universal.dmg)
          cp "$src" "Curio-universal.dmg"
          shasum -a 256 "Curio-universal.dmg"
      - name: Upload the DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-universal
          path: Curio-universal.dmg
          if-no-files-found: error

  release:
    name: draft the GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect the DMG
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Assemble release notes
        # The unsigned/Gatekeeper banner, then this version's CHANGELOG section
        # (everything between the first and second `## ` heading).
        run: |
          set -euo pipefail
          {
            echo "**Unsigned build** — Apple notarization is intentionally skipped."
            echo "On first launch macOS Gatekeeper will block it; open it once via"
            echo "**right-click → Open** (macOS 12–14) or **System Settings → Privacy"
            echo "& Security → Open Anyway** (macOS 15+), or clear quarantine:"
            echo '```sh'
            echo 'xattr -dr com.apple.quarantine "/Applications/Curio.app"'
            echo '```'
            echo "Install via Homebrew: \`brew install --cask alexnodeland/tap/curio\`"
            echo
            awk '/^## /{c++} c==1{print} c==2{exit}' CHANGELOG.md || true
          } > NOTES.md
          cat NOTES.md
      - name: Draft the release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: Curio ${{ github.ref_name }}
          body_path: NOTES.md
          fail_on_unmatched_files: true
          files: dist/Curio-universal.dmg
