# Release workflow — pushing a `vX.Y.Z` tag builds the unsigned macOS
# **universal** bundle (arm64 + x64 in one binary) on a single Apple-silicon
# runner, and publishes a DRAFT GitHub release with the DMG under the stable
# name the Homebrew cask expects (Curio-universal.dmg, which backs
# `releases/latest/download/Curio-universal.dmg`). A universal build avoids
# the scarce Intel (`macos-13`) runner queue entirely and matches the tap's
# other casks. The release is a DRAFT on purpose: nothing is public — and
# `brew` sees nothing — until a human reviews it and clicks Publish. macOS is
# the shipped channel, unsigned (docs/design/decisions.md).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify CHANGELOG leads with this tag's version
        # Release notes are extracted from the FIRST `## ` section of
        # CHANGELOG.md (see the "Assemble release notes" step). If the tag is cut
        # before a matching `## [X.Y.Z]` section is added, the release ships the
        # previous version's notes — this guard fails the build fast instead.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          want="${TAG#v}"
          got="$(grep -m1 -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | sed -E 's/[^0-9.]//g' || true)"
          if [ "$got" != "$want" ]; then
            echo "::error::CHANGELOG.md's leading section is [$got] but the tag is v$want — add a '## [$want]' section (release notes come from the first section)."
            exit 1
          fi
          echo "CHANGELOG leads with [$want] ✓"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci
      - name: Build the universal bundle (Apple-unsigned; updater-signed)
        working-directory: apps/desktop
        # Apple notarization is intentionally skipped (unsigned distribution,
        # see nightly.yml / decisions.md). The signing env below is the *Tauri
        # updater* minisign key — orthogonal to Apple codesign — so
        # `createUpdaterArtifacts` emits Curio.app.tar.gz(.sig). Universal lipo
        # of arm64 + x64 on the arm64 runner.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target universal-apple-darwin
      - name: Stage the DMG + updater artifacts and the manifest
        # The DMG keeps the cask's stable name (Curio-universal.dmg). The updater
        # consumes the .app.tar.gz (not the DMG) verified against the .sig; the
        # manifest lists BOTH darwin arch keys pointing at the one universal tar
        # with the one signature (the client looks up darwin-aarch64/x86_64 —
        # there is no darwin-universal key). `version` is plain semver (no `v`).
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          bundle=target/universal-apple-darwin/release/bundle
          version="${TAG#v}"
          mkdir -p dist
          cp "$(ls "$bundle"/dmg/Curio_*_universal.dmg)" dist/Curio-universal.dmg
          cp "$bundle"/macos/Curio.app.tar.gz dist/Curio.app.tar.gz
          shasum -a 256 dist/Curio-universal.dmg dist/Curio.app.tar.gz
          SIG="$(cat "$bundle"/macos/Curio.app.tar.gz.sig)" \
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Curio.app.tar.gz" \
          VERSION="$version" \
          node -e '
            const fs = require("fs");
            const { SIG, URL, VERSION } = process.env;
            const entry = { signature: SIG, url: URL };
            fs.writeFileSync("dist/latest.json", JSON.stringify({
              version: VERSION,
              notes: `Curio ${VERSION}`,
              pub_date: new Date().toISOString(),
              platforms: { "darwin-aarch64": entry, "darwin-x86_64": entry },
            }, null, 2));
          '
          cat dist/latest.json
      - name: Upload the release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error

  release:
    name: draft the GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect the release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Assemble release notes
        # The unsigned/Gatekeeper banner, then this version's CHANGELOG section
        # (everything between the first and second `## ` heading).
        run: |
          set -euo pipefail
          {
            echo "**Unsigned build** — Apple notarization is intentionally skipped."
            echo "On first launch macOS Gatekeeper will block it; open it once via"
            echo "**right-click → Open** (macOS 12–14) or **System Settings → Privacy"
            echo "& Security → Open Anyway** (macOS 15+), or clear quarantine:"
            echo '```sh'
            echo 'xattr -dr com.apple.quarantine "/Applications/Curio.app"'
            echo '```'
            echo "Install via Homebrew: \`brew install --cask alexnodeland/tap/curio\`"
            echo
            awk '/^## /{c++} c==1{print} c==2{exit}' CHANGELOG.md || true
          } > NOTES.md
          cat NOTES.md
      - name: Draft the release
        # Still a DRAFT on purpose (human review before public). The updater
        # endpoint `releases/latest/download/latest.json` resolves only once a
        # human clicks Publish — which is exactly the review gate we want: no
        # auto-update reaches users until the release is published.
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: Curio ${{ github.ref_name }}
          body_path: NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/Curio-universal.dmg
            dist/Curio.app.tar.gz
            dist/latest.json
