<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
        <title>Curio</title>
        <script>
            // Theme preload — runs before first paint so the persisted theme
            // (or the system preference) applies without a flash of the
            // default. Mirrors src/lib/state/ui.svelte.ts: the store owns the
            // same localStorage key and keeps it in sync with settings.
            (() => {
                const THEMES = [
                    'light',
                    'dark',
                    'nord',
                    'catppuccin',
                    'dracula',
                    'gruvbox',
                    'tokyo-night',
                    'solarized-dark',
                    'solarized-light',
                ];
                let theme = null;
                let customCss = null;
                try {
                    theme = window.localStorage.getItem('curio-theme');
                    customCss = window.localStorage.getItem('curio-theme-custom-css');
                } catch {
                    // localStorage unavailable — fall through to the system preference.
                }
                const isCustom = typeof theme === 'string' && /^custom-[a-z0-9-]+$/.test(theme);
                if (theme === null || theme === 'system' || (!THEMES.includes(theme) && !isCustom)) {
                    theme = window.matchMedia('(prefers-color-scheme: light)').matches
                        ? 'light'
                        : 'dark';
                }
                // A custom theme has no rule in app.css — inject the mirrored
                // rule (retired by the app once its own <style> is in place) so
                // the attribute below paints correctly, with no flash.
                if (isCustom && customCss) {
                    const style = document.createElement('style');
                    style.id = 'curio-custom-preload';
                    style.textContent = customCss;
                    document.head.appendChild(style);
                }
                document.documentElement.setAttribute('data-theme', theme);
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
