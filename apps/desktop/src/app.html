<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
        <title>Curio</title>
        <script>
            // Theme preload — runs before first paint so the persisted theme
            // (or the system preference) applies without a flash of the
            // default. Mirrors src/lib/state/ui.svelte.ts: the store owns the
            // same localStorage key and keeps it in sync with settings.
            (() => {
                const THEMES = [
                    'light',
                    'dark',
                    'nord',
                    'catppuccin',
                    'dracula',
                    'gruvbox',
                    'tokyo-night',
                    'solarized-dark',
                    'solarized-light',
                ];
                let theme = null;
                try {
                    theme = window.localStorage.getItem('curio-theme');
                } catch {
                    // localStorage unavailable — fall through to the system preference.
                }
                if (theme === null || theme === 'system' || !THEMES.includes(theme)) {
                    theme = window.matchMedia('(prefers-color-scheme: light)').matches
                        ? 'light'
                        : 'dark';
                }
                document.documentElement.setAttribute('data-theme', theme);
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
