# Lefthook git hooks — cargo workspace layout.
# https://github.com/evilmartians/lefthook
#
# Phase 4: the desktop head's Rust crate (apps/desktop/src-tauri) is a
# workspace member, so the Rust hooks below cover it too. The npm hooks
# (biome/svelte-check pre-commit, vitest pre-push) land with the frontend
# rewrite (WP2) — the parked sketch frontend would fail them by design.
# Rust hooks run on the whole workspace (staged-only games are not worth
# the drift).

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
      skip:
        - merge
        - rebase

    rust-clippy:
      glob: "*.{rs,toml}"
      run: cargo clippy --workspace --all-targets -- -D warnings
      skip:
        - merge
        - rebase

pre-push:
  commands:
    rust-tests:
      run: cargo test --workspace
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    conventional:
      run: |
        message=$(cat {1})
        if ! echo "$message" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .{1,100}"; then
          echo "Commit message must follow Conventional Commits format:"
          echo "  type(scope): description"
          echo ""
          echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
          echo ""
          echo "Examples:"
          echo "  feat(core): add conditional GET to the fetch client"
          echo "  fix(export): preserve user frontmatter keys on re-export"
          echo "  docs: update README with setup instructions"
          exit 1
        fi
