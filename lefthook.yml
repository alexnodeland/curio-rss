# Lefthook git hooks — cargo workspace layout.
# https://github.com/evilmartians/lefthook
#
# The desktop sketch under apps/desktop/ is outside the workspace until
# Phase 4; its npm hooks return when it rejoins. Rust hooks run on the
# whole workspace (it is small; staged-only games are not worth the drift).

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
      skip:
        - merge
        - rebase

    rust-clippy:
      glob: "*.{rs,toml}"
      run: cargo clippy --workspace --all-targets -- -D warnings
      skip:
        - merge
        - rebase

pre-push:
  commands:
    rust-tests:
      run: cargo test --workspace
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    conventional:
      run: |
        message=$(cat {1})
        if ! echo "$message" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .{1,100}"; then
          echo "Commit message must follow Conventional Commits format:"
          echo "  type(scope): description"
          echo ""
          echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
          echo ""
          echo "Examples:"
          echo "  feat(core): add conditional GET to the fetch client"
          echo "  fix(export): preserve user frontmatter keys on re-export"
          echo "  docs: update README with setup instructions"
          exit 1
        fi
