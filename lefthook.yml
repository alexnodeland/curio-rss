# Lefthook git hooks — cargo workspace layout.
# https://github.com/evilmartians/lefthook
#
# Phase 4: the desktop head's Rust crate (apps/desktop/src-tauri) is a
# workspace member, so the Rust hooks cover it too. The frontend rewrite
# (WP2) brought the promised npm hooks: biome + eslint (svelte templates) +
# svelte-check + the frontend-bans greps on commit, vitest on push — all
# glob-scoped to apps/desktop so Rust-only commits stay fast. They need
# `npm install` under apps/desktop once. Rust hooks run on the whole
# workspace (staged-only games are not worth the drift).

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
      skip:
        - merge
        - rebase

    rust-clippy:
      glob: "*.{rs,toml}"
      run: cargo clippy --workspace --all-targets -- -D warnings
      skip:
        - merge
        - rebase

    frontend-bans:
      glob: "apps/desktop/src/**"
      run: bash scripts/check-frontend-bans.sh
      skip:
        - merge
        - rebase

    desktop-biome:
      glob: "apps/desktop/**"
      run: cd apps/desktop && npm run lint
      skip:
        - merge
        - rebase

    desktop-eslint:
      glob: "apps/desktop/src/**"
      run: cd apps/desktop && npm run lint:eslint
      skip:
        - merge
        - rebase

    desktop-svelte-check:
      glob: "apps/desktop/src/**"
      run: cd apps/desktop && npm run check
      skip:
        - merge
        - rebase

pre-push:
  commands:
    rust-tests:
      run: cargo test --workspace
      skip:
        - merge
        - rebase

    desktop-vitest:
      glob: "apps/desktop/**"
      run: cd apps/desktop && npm run test
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    conventional:
      run: |
        message=$(cat {1})
        if ! echo "$message" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .{1,100}"; then
          echo "Commit message must follow Conventional Commits format:"
          echo "  type(scope): description"
          echo ""
          echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
          echo ""
          echo "Examples:"
          echo "  feat(core): add conditional GET to the fetch client"
          echo "  fix(export): preserve user frontmatter keys on re-export"
          echo "  docs: update README with setup instructions"
          exit 1
        fi
